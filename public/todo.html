<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet Tasks</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 20px; }
  .container { max-width: 500px; margin: 0 auto; }
  h1 { font-size: 1.5rem; margin-bottom: 4px; }
  .date { color: #94a3b8; font-size: 0.85rem; margin-bottom: 20px; }
  .task { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: #1e293b; border-radius: 10px; margin-bottom: 8px; transition: opacity 0.3s; cursor: pointer; -webkit-user-select: none; user-select: none; }
  .task.done { opacity: 0.4; }
  .task.done .label { text-decoration: line-through; }
  .check { width: 24px; height: 24px; border: 2px solid #475569; border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .task.done .check { background: #22c55e; border-color: #22c55e; }
  .check svg { display: none; }
  .task.done .check svg { display: block; }
  .info { flex: 1; }
  .label { font-size: 1rem; font-weight: 500; }
  .tag { display: inline-block; font-size: 0.7rem; font-weight: 600; padding: 2px 8px; border-radius: 4px; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .tag.checkin { background: #1e3a5f; color: #60a5fa; }
  .tag.checkout { background: #3b1f1f; color: #f87171; }
  .tag.clean { background: #1a3329; color: #4ade80; }
  .progress { margin-top: 20px; text-align: center; color: #64748b; font-size: 0.85rem; }
  .bar { height: 4px; background: #1e293b; border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .bar-fill { height: 100%; background: #22c55e; border-radius: 2px; transition: width 0.4s; }
</style>
</head>
<body>
<div class="container">
  <h1>🚗 Fleet Tasks</h1>
  <div class="date" id="date"></div>
  <div id="tasks"></div>
  <div class="progress">
    <span id="count"></span>
    <div class="bar"><div class="bar-fill" id="bar"></div></div>
  </div>
</div>
<script>
const tasks = [
  { car: "Rav4", type: "checkin" },
  { car: "Blue Jetta", type: "checkin" },
  { car: "2014 BMW X3", type: "checkin" },
  { car: "Veloster", type: "checkin" },
  { car: "Tiguan", type: "checkin" },
  { car: "Wrangler", type: "clean" },
  { car: "Gray Elantra", type: "checkin" },
  { car: "Red Elantra", type: "checkout" },
  { car: "White Jetta", type: "checkin" },
  { car: "Mazda", type: "clean" },
  { car: "Corolla 2019", type: "checkin" },
];

const KEY = "fleet-todo-" + new Date().toISOString().slice(0,10);
let state = JSON.parse(localStorage.getItem(KEY) || "{}");

const tagLabels = { checkin: "Clean & Check-in", checkout: "Checkout", clean: "Clean" };

function render() {
  const el = document.getElementById("tasks");
  el.innerHTML = tasks.map((t, i) => {
    const done = state[i] || false;
    return `<div class="task ${done ? 'done' : ''}" onclick="toggle(${i})">
      <div class="check"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7l3.5 3.5L12 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="info">
        <div class="label">${t.car}</div>
        <span class="tag ${t.type}">${tagLabels[t.type]}</span>
      </div>
    </div>`;
  }).join("");
  const done = Object.values(state).filter(Boolean).length;
  document.getElementById("count").textContent = `${done} / ${tasks.length} done`;
  document.getElementById("bar").style.width = `${(done/tasks.length)*100}%`;
}

function toggle(i) {
  state[i] = !state[i];
  localStorage.setItem(KEY, JSON.stringify(state));
  render();
}

document.getElementById("date").textContent = new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" });
render();
</script>
</body>
</html>
